<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Navbar Example</title>

<style>

body {
  margin: 0;
  font-family: "Segoe UI", Arial, sans-serif;
}

/* NAVBAR */
.navbar {
  background: linear-gradient(90deg, #00264d, #004080);
  position: sticky;
  top: 0;
}

/* INNER */
.nav-inner {
  max-width: 1200px;
  margin: auto;
  padding: 12px 20px;
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  align-items: center;
}

/* LINKS */
.nav-inner a {
  color: #cbd5e1;
  text-decoration: none;
  font-weight: 500;
  padding: 6px 10px;
  border-radius: 4px;
}

.nav-inner a:hover {
  background: rgba(255,255,255,0.1);
  color: #60a5fa;
}

/* DROPDOWN */
.dropdown {
  position: relative;
}

/* BUTTON */
.dropbtn {
  background: none;
  border: none;
  color: #cbd5e1;
  font-weight: 500;
  font-size: 16px;
  cursor: pointer;
  padding: 6px 10px;
  border-radius: 4px;
}

.dropbtn:hover {
  background: rgba(255,255,255,0.1);
  color: #60a5fa;
}

/* DROPDOWN CONTENT */
.dropdown-content {
  display: none;
  position: absolute;
  background: #0b2d5c;
  min-width: 160px;
  border-radius: 6px;
  top: 100%;
  left: 0;
  box-shadow: 0 4px 8px rgba(0,0,0,0.2);
}

/* SHOW ON HOVER */
.dropdown:hover .dropdown-content {
  display: block;
}

/* DROPDOWN LINKS */
.dropdown-content a {
  display: block;
  padding: 8px 12px;
  color: #cbd5e1;
}

.dropdown-content a:hover {
  background: #1e3a8a;
  color: white;
}

</style>

</head>
<body>

<nav class="navbar">
  <div class="nav-inner">

    <a href="home.html">Home</a>
    <a href="conference-and-workshop.html">Conference & Workshop</a>
    <a href="publications.html">Publications</a>
    <a href="projects.html">Projects</a>
    <a href="courses.html">Courses</a>
    <a href="service.html">Service</a>

    <div class="dropdown">
      <button class="dropbtn">Insights ▼</button>
      <div class="dropdown-content">
        <a href="insights.html">Posts</a>
        <a href="videos.html">Videos</a>
      </div>
    </div>

  </div>
</nav>

<!-- SAMPLE CONTENT -->
<div style="padding:40px;">
  <h2>Welcome</h2>
  <p>This is a working navbar example.</p>
</div>

</body>
</html>
